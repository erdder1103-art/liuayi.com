<body>
  <div class="wrapper">
    <div class="frame">
      <img src="assets/bg.jpg" class="bg" alt="" loading="eager" decoding="async">
      <img src="assets/logo.png" class="logo" alt="" loading="eager" decoding="async">
      <img src="assets/ip.png" class="ip" alt="" loading="eager" decoding="async">

      <div class="btnWrapper">
        <a href="https://line.me/R/ti/p/@627yzfja"
           class="goLine"
           data-area="btn"
           rel="noopener"
           aria-label="加入 LINE">
          <img src="assets/btn.png" class="btn" alt="加入 LINE" loading="eager" decoding="async">
        </a>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
      var LINE_URL = window.APP_CONFIG.LINE_URL;
      var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;

      var clicked = false;

      function uuidv4(){
        if(window.crypto && typeof window.crypto.randomUUID === "function"){
          return window.crypto.randomUUID();
        }

        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){
          var r = Math.random() * 16 | 0;
          var v = c === "x" ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      function buildParams(area){
        return {
          action_source: "website",
          content_name: "line_contact_click",
          content_category: "line_redirect",
          contact_method: "line",
          click_area: area || "btn",
          destination: "official_line",
          event_source_url: window.location.href
        };
      }

      function sendFallbackPixel(eventName, params, eventID){
        var url = "https://www.facebook.com/tr?id=" + encodeURIComponent(PIXEL_ID) +
          "&ev=" + encodeURIComponent(eventName) +
          "&dl=" + encodeURIComponent(window.location.href) +
          "&rl=" + encodeURIComponent(document.referrer || "") +
          "&if=false" +
          "&ts=" + Date.now() +
          "&eid=" + encodeURIComponent(eventID || uuidv4());

        if(params){
          Object.keys(params).forEach(function(key){
            url += "&cd[" + encodeURIComponent(key) + "]=" + encodeURIComponent(params[key]);
          });
        }

        var img = new Image();
        img.src = url;
      }

      function firePixelEvents(area){
        var params = buildParams(area);

        var leadEventID = "lead_" + uuidv4();
        var contactEventID = "contact_" + uuidv4();
        var lineClickEventID = "lineclick_" + uuidv4();

        /*
          主要事件：
          使用 trackSingle，明確指定送到劉阿姨 Pixel
        */
        if(typeof fbq === "function"){
          try{
            fbq(
              "trackSingle",
              PIXEL_ID,
              "Lead",
              params,
              {eventID: leadEventID}
            );
          }catch(e){}

          try{
            fbq(
              "trackSingle",
              PIXEL_ID,
              "Contact",
              params,
              {eventID: contactEventID}
            );
          }catch(e){}

          try{
            fbq(
              "trackSingleCustom",
              PIXEL_ID,
              "LineClick",
              params,
              {eventID: lineClickEventID}
            );
          }catch(e){}
        }

        /*
          備援事件：
          就算 fbq 被擋，Network 仍有機會看到 facebook.com/tr
        */
        sendFallbackPixel("Lead", params, leadEventID);
        sendFallbackPixel("Contact", params, contactEventID);
        sendFallbackPixel("LineClick", params, lineClickEventID);
      }

      function goLine(){
        window.location.href = LINE_URL;
      }

      var btn = document.querySelector(".goLine");

      if(btn){
        btn.addEventListener("click", function(e){
          e.preventDefault();

          if(clicked) return;
          clicked = true;

          var area = btn.getAttribute("data-area") || "btn";

          firePixelEvents(area);

          setTimeout(goLine, REDIRECT_DELAY);
        }, {passive:false});
      }

      /*
        使用者返回上一頁時，允許重新點擊
      */
      window.addEventListener("pageshow", function(){
        clicked = false;
      });
    })();
  </script>
</body>
