<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
}

.wrapper{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

.logo{
  position:absolute;
  top:-15%;
  left:70%;
  transform:translateX(-50%);
  width:60%;
  z-index:2;
  pointer-events:none;
}

.ip{
  position:absolute;
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  width:200%;
  z-index:3;
  pointer-events:none;
}

.btnWrapper{
  position:absolute;
  bottom:-25%;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  z-index:10;
}

.goLine{
  display:block;
  width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.btn{
  width:100%;
  display:block;
  cursor:pointer;
  animation:breath 1.8s ease-in-out infinite;
}

@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

.tap{
  position:absolute;
  display:block;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  background:rgba(255,255,255,0);
  z-index:9;
}

.tap-bg{
  inset:0;
}

.tap-logo{
  top:-5%;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:22%;
}

.tap-ip{
  bottom:12%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  height:22%;
}

.tap-btn{
  bottom:6%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:12%;
  z-index:11;
}

.loadingText{
  position:absolute;
  left:50%;
  bottom:3%;
  transform:translateX(-50%);
  z-index:20;
  background:rgba(0,0,0,.72);
  color:#fff;
  font-size:14px;
  font-weight:700;
  padding:8px 14px;
  border-radius:999px;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.loadingText.show{
  opacity:1;
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
    <img src="assets/logo.png" class="logo" alt="" loading="eager">
    <img src="assets/ip.png" class="ip" alt="" loading="eager">

    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@627yzfja" class="goLine" data-area="btn" rel="noopener">
        <img src="assets/btn.png" class="btn" alt="LINE官方 領取優惠" loading="eager">
      </a>
    </div>

    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-bg" data-area="bg" rel="noopener" aria-label="前往 LINE 官方領取優惠"></a>
    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-logo" data-area="logo" rel="noopener" aria-label="前往 LINE 官方領取優惠"></a>
    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-ip" data-area="ip" rel="noopener" aria-label="前往 LINE 官方領取優惠"></a>
    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-btn" data-area="btnOverlay" rel="noopener" aria-label="前往 LINE 官方領取優惠"></a>

    <div id="loadingText" class="loadingText">正在前往 LINE...</div>
  </div>
</div>

<script>
(function(){
  var PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
  var LINE_URL = window.APP_CONFIG.LINE_URL;
  var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;
  var hasClicked = false;

  function uuid(){
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
      return window.crypto.randomUUID();
    }

    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r = Math.random() * 16 | 0;
      var v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function fireEvents(area){
    if(typeof fbq !== 'function'){
      console.warn('fbq 尚未載入，點擊事件未送出');
      return;
    }

    var base = {
      content_name: 'liu_a_yi_line_contact_click',
      content_category: 'line_redirect',
      contact_method: 'line',
      click_area: area || 'main_cta',
      destination: 'official_line',
      destination_url: LINE_URL,
      event_source_url: window.location.href
    };

    var purchaseBase = {
      content_name: 'liu_a_yi_line_contact_click',
      content_category: 'line_redirect',
      contact_method: 'line',
      click_area: area || 'main_cta',
      destination: 'official_line',
      destination_url: LINE_URL,
      event_source_url: window.location.href,
      value: 0,
      currency: 'TWD'
    };

    /*
      改成跟你正常可收到事件的版本一樣：
      使用 fbq('track') / fbq('trackCustom')
    */
    fbq('track', 'Lead', base, {
      eventID: 'lead_' + uuid()
    });

    fbq('track', 'Contact', base, {
      eventID: 'contact_' + uuid()
    });

    fbq('track', 'Purchase', purchaseBase, {
      eventID: 'purchase_' + uuid()
    });

    fbq('trackCustom', 'LineClick', base, {
      eventID: 'lineclick_' + uuid()
    });

    console.log('Meta Pixel 已送出：Lead / Contact / Purchase / LineClick', base);
  }

  function handleClick(e){
    e.preventDefault();

    if(hasClicked) return;
    hasClicked = true;

    var area = this.getAttribute('data-area') || 'main_cta';

    var loadingText = document.getElementById('loadingText');
    if(loadingText){
      loadingText.classList.add('show');
    }

    fireEvents(area);

    setTimeout(function(){
      window.location.href = LINE_URL;
    }, REDIRECT_DELAY);
  }

  document.querySelectorAll('.goLine').forEach(function(el){
    el.setAttribute('href', LINE_URL);
    el.addEventListener('click', handleClick, { passive:false });
  });

  window.addEventListener('pageshow', function(){
    hasClicked = false;

    var loadingText = document.getElementById('loadingText');
    if(loadingText){
      loadingText.classList.remove('show');
    }
  });
})();
</script>
</body>
</html>
