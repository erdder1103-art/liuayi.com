<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>劉阿姨-LINE即玩-1:100</title>
  <meta name="facebook-domain-verification" content="yf0jsegjtkpqk4j0ayo327oddygjxv" />

  <!-- Meta Pixel Code -->
  <script>
    window.APP_CONFIG = {
      PIXEL_ID: '961107183386052',
      LINE_URL: 'https://line.me/R/ti/p/@627yzfja',
      REDIRECT_DELAY: 1200
    };

    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq)f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', window.APP_CONFIG.PIXEL_ID);
    fbq('track', 'PageView');

    /*
      備援 PageView：
      如果 Pixel Helper 沒抓到 fbq，這個會強制送出 facebook.com/tr
    */
    (function(){
      var img = new Image();
      img.src = 'https://www.facebook.com/tr?id=' + window.APP_CONFIG.PIXEL_ID +
        '&ev=PageView' +
        '&dl=' + encodeURIComponent(window.location.href) +
        '&rl=' + encodeURIComponent(document.referrer || '') +
        '&if=false' +
        '&ts=' + Date.now();
    })();
  </script>

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=961107183386052&ev=PageView&noscript=1"/>
  </noscript>

  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#000;font-family:system-ui;}
    .wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;}
    .frame{position:relative;width:100%;max-width:420px;aspect-ratio:9/16;overflow:hidden;background:#000;}
    .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

    .logo{
      position:absolute;
      top:-15%;
      left:70%;
      transform:translateX(-50%);
      width:60%;
    }

    .ip{
      position:absolute;
      bottom:12%;
      left:50%;
      transform:translateX(-50%);
      width:200%;
    }

    .btnWrapper{
      position:absolute;
      bottom:-25%;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      z-index:5;
    }

    .goLine{display:block;width:100%;}
    .btn{width:100%;animation:breath 1.8s infinite;}
    @keyframes breath{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
  </style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg">
    <img src="assets/logo.png" class="logo">
    <img src="assets/ip.png" class="ip">

    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@627yzfja" class="goLine" data-area="main_cta">
        <img src="assets/btn.png" class="btn">
      </a>
    </div>
  </div>
</div>

<script>
(function () {
  var PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
  var LINE_URL = window.APP_CONFIG.LINE_URL;
  var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;
  var hasClicked = false;

  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  function sendFallbackPixel(eventName, params){
    var url = 'https://www.facebook.com/tr?id=' + encodeURIComponent(PIXEL_ID) +
      '&ev=' + encodeURIComponent(eventName) +
      '&dl=' + encodeURIComponent(window.location.href) +
      '&rl=' + encodeURIComponent(document.referrer || '') +
      '&if=false' +
      '&ts=' + Date.now();

    if(params){
      Object.keys(params).forEach(function(key){
        url += '&cd[' + encodeURIComponent(key) + ']=' + encodeURIComponent(params[key]);
      });
    }

    var img = new Image();
    img.src = url;
  }

  function fireEvents(area){
    var base = {
      content_name:"line_contact_click",
      content_category:"line_redirect",
      contact_method:"line",
      click_area:area || "main_cta",
      destination:"official_line"
    };

    var purchaseBase = {
      content_name:"line_contact_click",
      content_category:"line_redirect",
      contact_method:"line",
      click_area:area || "main_cta",
      destination:"official_line",
      value:0,
      currency:"TWD"
    };

    /*
      橙總派對原本寫法
    */
    if(typeof fbq === 'function'){
      fbq('track','Contact',base,{eventID:'c_'+uuid()});
      fbq('track','Lead',base,{eventID:'l_'+uuid()});
      fbq('track','Purchase',purchaseBase,{eventID:'p_'+uuid()});
      fbq('trackCustom','LineClick',base,{eventID:'lc_'+uuid()});
    }

    /*
      備援強制回傳：
      Network 一定會看到 facebook.com/tr
    */
    sendFallbackPixel('Contact', base);
    sendFallbackPixel('Lead', base);
    sendFallbackPixel('Purchase', purchaseBase);
    sendFallbackPixel('LineClick', base);
  }

  function handleClick(e){
    e.preventDefault();
    if(hasClicked) return;
    hasClicked = true;

    var area = this.dataset.area || "main_cta";
    fireEvents(area);

    setTimeout(function(){
      window.location.href = LINE_URL;
    }, REDIRECT_DELAY);
  }

  document.querySelectorAll('.goLine').forEach(function(el){
    el.addEventListener('click', handleClick, { passive:false });
  });
})();
</script>

</body>
</html>
