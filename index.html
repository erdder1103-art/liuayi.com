<style>
body{margin:0;background:#000;font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial;}
.wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;}
.frame{position:relative;width:100%;max-width:420px;aspect-ratio:9/16;overflow:hidden;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.logo{position:absolute;top:-15%;left:70%;transform:translateX(-50%);width:60%;}
.ip{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:200%;}
.btnWrapper{position:absolute;bottom:-25%;left:50%;transform:translateX(-50%);width:100%;}
.btn{width:100%;cursor:pointer;display:block;animation:breath 1.8s ease-in-out infinite;}
@keyframes breath{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

.tap{position:absolute;display:block;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tap-bg{inset:0;}
.tap-logo{top:-5%;left:50%;transform:translateX(-50%);width:60%;height:22%;}
.tap-ip{bottom:12%;left:50%;transform:translateX(-50%);width:90%;height:22%;}

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
    <img src="assets/logo.png" class="logo" alt="" loading="eager">

    <div class="btnWrapper">

    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-ip" data-area="ip" rel="noopener" aria-label=""></a>
    <a href="https://line.me/R/ti/p/@627yzfja" class="goLine tap tap-btn" data-area="btnOverlay" rel="noopener" aria-label=""></a>
  </div>
</div>

<script>
(function(){
  const LINE_URL = "https://line.me/R/ti/p/@627yzfja";
  const REDIRECT_DELAY = 800;
  const PIXEL_ID = "961107183386052";

  function uuidv4(){
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      var r = Math.random() * 16 | 0;
      var v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  let clicked = false;

  function firePixelEvent(eventName, area){
    if (typeof fbq !== 'function') return;

    const params = {
      action_source: "website",
      contact_method: "line",
      click_area: area || "unknown",
      content_name: "LINE官方 領取優惠",
      destination_url: LINE_URL,
      event_source_url: window.location.href
    };

    try {
      fbq('trackSingle', PIXEL_ID, eventName, params, { eventID: eventName + "_" + uuidv4() });
    } catch(e) {}
  }

  function fireCustomLineClick(area){
    if (typeof fbq !== 'function') return;

    const params = {
      action_source: "website",
      contact_method: "line",
      click_area: area || "unknown",
      content_name: "LINE官方 領取優惠",
      destination_url: LINE_URL,
      event_source_url: window.location.href
    };

    try {
      fbq('trackSingleCustom', PIXEL_ID, 'LineClick', params, { eventID: "LineClick_" + uuidv4() });
    } catch(e) {}
  }

  function fireEvents(area){
    firePixelEvent('Contact', area);
    firePixelEvent('Lead', area);
    fireCustomLineClick(area);
  }

  function goLine(){
    window.location.href = LINE_URL;
  }

  document.querySelectorAll('.goLine').forEach(function(a){
    a.setAttribute('href', LINE_URL);

    a.addEventListener('click', function(e){
      e.preventDefault();
      if (clicked) return;
      clicked = true;

      const area = a.getAttribute('data-area') || 'unknown';
      fireEvents(area);

      setTimeout(goLine, REDIRECT_DELAY);
    });
  });

  window.addEventListener('pageshow', function(){
    clicked = false;
  });
})();
</script>
